<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>考试结果 · 环慧慧EHS+</title>
  <style>
    /* 样式复用自由练习，与自由练习结束页面完全一致 */
    :root {
      --color-brand: #1570EF; --color-brand-hover: #2E90FA; --color-success: #52C41A;
      --color-warning: #FA8C16; --color-danger: #F54A45; --color-text-primary: #1A1A1A;
      --color-text-secondary: #666666; --color-text-placeholder: #999999;
      --color-bg-page: #F5F5F5; --color-bg-surface: #FFFFFF;
      --color-border: #E5E5E5; --color-divider: #EEEEEE;
      --radius-card: 12px;
      --font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-family); font-size: 15px; line-height: 1.5;
      color: var(--color-text-primary); background: var(--color-bg-page);
      max-width: 414px; margin: 0 auto; min-height: 100vh;
      -webkit-tap-highlight-color: transparent; -webkit-font-smoothing: antialiased;
      padding-bottom: calc(80px + env(safe-area-inset-bottom, 16px));
    }

    .status-bar { height: env(safe-area-inset-top, 20px); background: #fff; }

    .nav-bar { position: sticky; top: 0; z-index: 100; background: #fff; border-bottom: 1px solid var(--color-divider); }
    .nav-inner { height: 44px; display: flex; align-items: center; justify-content: center; padding: 0 16px; position: relative; }
    .nav-back {
      position: absolute; left: 12px; width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      background: transparent; border: 0; color: var(--color-text-primary); cursor: pointer;
    }
    .nav-back svg { width: 20px; height: 20px; }
    .nav-title { font-size: 17px; font-weight: 500; color: var(--color-text-primary); }

    .result-header { background: #fff; margin: 16px; border-radius: var(--radius-card); padding: 28px 24px 24px; text-align: center; box-shadow: 0 2px 12px rgba(0,0,0,0.06); position: relative; }
    .result-practice-name { font-size: 18px; font-weight: 600; color: var(--color-text-primary); margin-bottom: 20px; }

    .circle-progress-wrap { position: relative; width: 140px; height: 140px; margin: 0 auto 16px; }
    .circle-progress-wrap svg { transform: rotate(-90deg); width: 140px; height: 140px; }
    .circle-bg { fill: none; stroke: var(--color-divider); stroke-width: 10; }
    .circle-fill { fill: none; stroke-width: 10; stroke-linecap: round; transition: stroke-dashoffset 800ms ease; }
    .circle-fill.high { stroke: var(--color-success); }
    .circle-fill.medium { stroke: var(--color-warning); }
    .circle-fill.low { stroke: var(--color-danger); }

    .circle-inner { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .circle-percent { font-size: 36px; font-weight: 700; color: var(--color-text-primary); line-height: 1; }
    .circle-percent-symbol { font-size: 18px; font-weight: 500; }
    .circle-label { font-size: 13px; color: var(--color-text-placeholder); margin-top: 4px; }

    .result-stats { display: flex; justify-content: center; gap: 32px; margin-top: 16px; }
    .result-stat-item { text-align: center; }
    .result-stat-value { font-size: 22px; font-weight: 700; color: var(--color-text-primary); line-height: 1.3; }
    .result-stat-value.brand { color: var(--color-brand); }
    .result-stat-label { font-size: 13px; color: var(--color-text-placeholder); }

    .result-msg { font-size: 16px; font-weight: 500; margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--color-divider); }
    .result-msg.great { color: var(--color-success); }
    .result-msg.near { color: var(--color-warning); }
    .result-msg.low { color: var(--color-danger); }

    .answer-card { background: #fff; margin: 0 16px 16px; border-radius: var(--radius-card); padding: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); position: relative; }
    .answer-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .answer-card-title { font-size: 15px; font-weight: 600; color: var(--color-text-primary); }
    .answer-legend { display: flex; gap: 16px; }
    .legend-item { display: flex; align-items: center; gap: 4px; font-size: 12px; color: var(--color-text-secondary); }
    .legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
    .legend-dot.correct { background: var(--color-success); }
    .legend-dot.wrong { background: var(--color-danger); }
    .legend-dot.unanswered { background: var(--color-border); }
    .legend-count { font-weight: 500; color: var(--color-text-primary); }

    .answer-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
    .answer-tag { display: flex; align-items: center; justify-content: center; padding: 10px 0; border-radius: 6px; font-size: 13px; font-weight: 500; }
    .answer-tag.correct { background: #F0FFF4; color: var(--color-success); border: 1px solid #B7EB8F; }
    .answer-tag.wrong { background: #FFF1F0; color: var(--color-danger); border: 1px solid #FFA39E; }
    .answer-tag.unanswered { background: #FAFAFA; color: var(--color-text-placeholder); border: 1px solid var(--color-border); }

    .bottom-bar {
      position: fixed; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 414px; bottom: 0; background: #fff;
      border-top: 1px solid var(--color-divider);
      padding: 12px 16px calc(12px + env(safe-area-inset-bottom, 16px)); z-index: 100;
    }
    .bottom-actions { display: flex; gap: 12px; max-width: 414px; margin: 0 auto; }
    .btn {
      height: 44px; padding: 0 20px; border-radius: 8px; font-size: 15px; font-weight: 500;
      cursor: pointer; border: none; display: flex; align-items: center; justify-content: center;
      transition: all 150ms ease; flex: 1;
    }
    .btn-default { background: #fff; border: 1px solid var(--color-border); color: var(--color-text-primary); }
    .btn-default:active { background: #F5F5F5; }
    .btn-primary { background: var(--color-brand); color: #fff; }
    .btn-primary:active { background: var(--color-brand-hover); }

    .confirm-modal {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center;
      z-index: 300; padding: 32px;
    }
    .confirm-modal.is-open { display: flex; }
    .confirm-box { background: #fff; border-radius: 14px; width: 100%; max-width: 290px; text-align: center; overflow: hidden; }
    .confirm-body { padding: 24px 20px 20px; }
    .confirm-title { font-size: 17px; font-weight: 600; color: var(--color-text-primary); margin-bottom: 8px; }
    .confirm-desc { font-size: 14px; color: var(--color-text-secondary); line-height: 1.5; }
    .confirm-divider { height: 1px; background: var(--color-divider); }
    .confirm-actions-vertical { display: flex; flex-direction: column; }
    .confirm-btn { height: 44px; font-size: 17px; font-weight: 400; background: #fff; border: none; cursor: pointer; color: var(--color-brand); -webkit-tap-highlight-color: transparent; }
    .confirm-btn:active { background: #F5F5F5; }
    .confirm-btn-confirm { color: var(--color-brand); font-weight: 600; }
    .confirm-btn-cancel { color: var(--color-brand); }
    .confirm-btn-divider { height: 1px; background: var(--color-divider); }

    /* ========== 角标样式 ========== */
    .prd-badge {
      display: inline-block !important; vertical-align: top !important;
      font-size: 10px !important; font-weight: bold !important; line-height: 14px !important;
      padding: 0px 4px !important; border-radius: 2px !important;
      color: #fff !important; cursor: pointer !important;
      position: absolute !important; top: -8px !important; right: -4px !important;
      z-index: 900 !important; white-space: nowrap !important;
      font-family: var(--font-family) !important;
    }
    .prd-badge.normal { background: rgb(250, 173, 20) !important; }
    .prd-badge.changed { background: #F54A45 !important; }
    .badge-wrapper { position: relative; display: inline-block; }

    .prd-tooltip {
      position: fixed; z-index: 9959;
      background: #FFFFFF; border: 2px solid #1890ff; border-radius: 4px;
      box-shadow: 0 6px 16px rgba(0,120,255,0.15);
      width: 450px; max-width: calc(100vw - 20px);
      display: none; font-family: var(--font-family); font-size: 13px;
    }
    .prd-tooltip-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; background: #F0F7FF; border-bottom: 1px solid #E8E8E8; cursor: move; user-select: none; }
    .prd-tooltip-title { font-weight: 600; color: var(--color-text-primary); font-size: 14px; }
    .prd-tooltip-close { width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; background: transparent; border: none; color: var(--color-text-placeholder); cursor: pointer; font-size: 16px; border-radius: 2px; }
    .prd-tooltip-close:hover { background: #E8E8E8; }
    .prd-tooltip-body { padding: 14px; max-height: 380px; overflow-y: auto; line-height: 1.6; color: var(--color-text-secondary); }
    .prd-tooltip-body p { margin-bottom: 12px; }
    .prd-tooltip-body strong { color: var(--color-text-primary); }
    .prd-tooltip-body ul, .prd-tooltip-body ol { padding-left: 18px; margin-bottom: 12px; }
    .prd-tooltip-body li { margin-bottom: 4px; }
    .prd-tooltip-body blockquote { border-left: 3px solid #E8E8E8; padding-left: 10px; margin: 0 0 12px; color: var(--color-text-placeholder); }
    .prd-tooltip-body table { width: 100%; border-collapse: collapse; margin-bottom: 12px; font-size: 12px; }
    .prd-tooltip-body th, .prd-tooltip-body td { border: 1px solid #E8E8E8; padding: 4px 8px; text-align: left; }
    .prd-tooltip-body th { background: #FAFAFA; font-weight: 600; }

    .prd-drawer-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.45); z-index: 10000; display: none; }
    .prd-drawer-overlay.is-open { display: block; }
    .prd-drawer { position: fixed; top: 0; right: -600px; width: 600px; max-width: 100vw; height: 100vh; background: #fff; z-index: 10001; transition: right 300ms ease; display: flex; flex-direction: column; box-shadow: -4px 0 16px rgba(0,0,0,0.1); }
    .prd-drawer.is-open { right: 0; }
    .prd-drawer-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--color-divider); flex-shrink: 0; }
    .prd-drawer-title { font-size: 17px; font-weight: 600; color: var(--color-text-primary); }
    .prd-drawer-close { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; background: transparent; border: none; font-size: 20px; color: var(--color-text-secondary); cursor: pointer; }
    .prd-drawer-body { flex: 1; overflow-y: auto; padding: 20px; line-height: 1.6; }
    .prd-drawer-body h1, .prd-drawer-body h2, .prd-drawer-body h3 { color: var(--color-text-primary); margin: 20px 0 10px; }
    .prd-drawer-body h1 { font-size: 20px; } .prd-drawer-body h2 { font-size: 17px; border-bottom: 1px solid var(--color-divider); padding-bottom: 6px; } .prd-drawer-body h3 { font-size: 15px; }
    .prd-drawer-body p { margin-bottom: 10px; color: var(--color-text-secondary); }
    .prd-drawer-body ul, .prd-drawer-body ol { padding-left: 20px; margin-bottom: 10px; }
    .prd-drawer-body li { margin-bottom: 4px; }
    .prd-drawer-body table { width: 100%; border-collapse: collapse; margin-bottom: 16px; font-size: 13px; }
    .prd-drawer-body th, .prd-drawer-body td { border: 1px solid #E8E8E8; padding: 6px 10px; text-align: left; }
    .prd-drawer-body th { background: #FAFAFA; font-weight: 600; }
    .prd-drawer-body blockquote { border-left: 3px solid var(--color-brand); padding-left: 12px; margin: 0 0 12px; color: var(--color-text-placeholder); background: #F8F9FA; padding: 8px 12px; }

    .badge-toggle-btn { position: fixed !important; bottom: 20px !important; right: 20px !important; z-index: 10001 !important; width: 44px !important; height: 44px !important; border-radius: 50% !important; background: #307FE2 !important; border: none !important; color: #fff !important; cursor: pointer !important; display: flex !important; align-items: center !important; justify-content: center !important; box-shadow: 0 2px 8px rgba(0,0,0,0.2) !important; }
    .badge-toggle-btn svg { width: 20px; height: 20px; }
    .prd-nav-btns { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); display: flex; gap: 6px; }
    .prd-nav-btn { height: 26px; padding: 0 8px; border-radius: 4px; font-size: 11px; font-weight: 500; background: #F0F7FF; border: 1px solid #1890ff; color: #1890ff; cursor: pointer; white-space: nowrap; }
  </style>
</head>
<body>

  <div class="status-bar"></div>

  <div class="nav-bar">
    <div class="nav-inner">
      <button class="nav-back" type="button" aria-label="返回" id="backBtn">
        <span class="badge-wrapper" style="position:absolute;top:-4px;right:2px;">
          <span class="prd-badge normal" data-badge-id="1">1</span>
        </span>
        <svg viewBox="0 0 48 48" fill="currentColor"><path d="M30.83 37.17L17.66 24 30.83 10.83 28 8 12 24l16 16z"/></svg>
      </button>
      <span class="badge-wrapper">
        <span class="nav-title">考试结果</span>
        <span class="prd-badge normal" data-badge-id="2">2</span>
      </span>
      <div class="prd-nav-btns">
        <button class="prd-nav-btn" onclick="openDrawer()" title="查看页面PRD">📄 页面PRD</button>
      </div>
    </div>
  </div>

  <!-- 结果头部 -->
  <div class="result-header">
    <span class="badge-wrapper" style="position:absolute;top:-8px;right:12px;">
      <span class="prd-badge normal" data-badge-id="3">3</span>
    </span>
    <div class="result-practice-name">
      <span id="practiceName">模拟练习</span>
      <span class="badge-wrapper" style="margin-left:4px;">
        <span class="prd-badge changed" style="position:static !important;" data-badge-id="4">4</span>
      </span>
    </div>

    <div class="circle-progress-wrap">
      <svg viewBox="0 0 140 140">
        <circle class="circle-bg" cx="70" cy="70" r="62"/>
        <circle class="circle-fill high" id="circleFill" cx="70" cy="70" r="62" stroke-dasharray="389.56" stroke-dashoffset="155.82"/>
      </svg>
      <div class="circle-inner">
        <div class="circle-percent"><span id="scorePercent">60</span><span class="circle-percent-symbol">%</span></div>
        <div class="circle-label">正确率</div>
      </div>
    </div>

    <div class="result-stats">
      <div class="result-stat-item"><div class="result-stat-value brand" id="totalCount">100</div><div class="result-stat-label">答题总数</div></div>
      <div class="result-stat-item"><div class="result-stat-value" id="correctCount">60</div><div class="result-stat-label">答对数量</div></div>
    </div>

    <div class="result-msg near" id="resultMsg">接近全对，再努力一点，下次完美！</div>
  </div>

  <!-- 答题卡 -->
  <div class="answer-card">
    <span class="badge-wrapper" style="position:absolute;top:-8px;right:12px;">
      <span class="prd-badge normal" data-badge-id="5">5</span>
    </span>
    <div class="answer-card-header">
      <span class="answer-card-title">答题卡</span>
      <div class="answer-legend">
        <span class="legend-item"><span class="legend-dot correct"></span>答对<span class="legend-count" id="legendCorrect">(60)</span></span>
        <span class="legend-item"><span class="legend-dot wrong"></span>答错<span class="legend-count" id="legendWrong">(35)</span></span>
        <span class="legend-item"><span class="legend-dot unanswered"></span>未做<span class="legend-count" id="legendUnanswered">(5)</span></span>
      </div>
    </div>
    <div class="answer-grid" id="answerGrid"></div>
  </div>

  <!-- 底部按钮 -->
  <div class="bottom-bar">
    <span class="badge-wrapper" style="position:absolute;top:-8px;left:16px;">
      <span class="prd-badge normal" data-badge-id="6">6</span>
    </span>
    <div class="bottom-actions">
      <button class="btn btn-default" id="viewDetailBtn">查看详情</button>
      <button class="btn btn-primary" id="retryBtn">再次练习</button>
    </div>
  </div>

  <div class="confirm-modal" id="retryConfirmModal">
    <div class="confirm-box">
      <div class="confirm-body"><div class="confirm-title">提示</div><div class="confirm-desc">确定重新练习吗？</div></div>
      <div class="confirm-divider"></div>
      <div class="confirm-actions-vertical">
        <button class="confirm-btn confirm-btn-confirm" id="confirmRetry">确定</button>
        <div class="confirm-btn-divider"></div>
        <button class="confirm-btn confirm-btn-cancel" id="cancelRetry">取消</button>
      </div>
    </div>
  </div>

  <!-- ========== 标注浮窗容器 ========== -->
  <div class="prd-tooltip" id="tooltip-1"></div>
  <div class="prd-tooltip" id="tooltip-2"></div>
  <div class="prd-tooltip" id="tooltip-3"></div>
  <div class="prd-tooltip" id="tooltip-4"></div>
  <div class="prd-tooltip" id="tooltip-5"></div>
  <div class="prd-tooltip" id="tooltip-6"></div>

  <div class="prd-drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
  <div class="prd-drawer" id="drawer">
    <div class="prd-drawer-header">
      <span class="prd-drawer-title">📄 小程序练习结束页面 · 页面 PRD</span>
      <button class="prd-drawer-close" onclick="closeDrawer()">×</button>
    </div>
    <div class="prd-drawer-body" id="drawerBody"></div>
  </div>

  <button class="badge-toggle-btn" id="badgeToggle" title="显示/隐藏标注">
    <svg id="toggleEyeOn" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
    <svg id="toggleEyeOff" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none;"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
  </button>

// ==================== 标注数据 ====================
var badgeData = {

// ==================== 通用浮窗交互 ====================
var activeTooltip=null,tooltipTimers={};
function showTooltip(id,e){
  var tip=document.getElementById('tooltip-'+id),data=badgeData[id];
  if(!tip||!data)return;
  if(tooltipTimers[id])clearTimeout(tooltipTimers[id]);
  if(activeTooltip&&activeTooltip!==tip)activeTooltip.style.display='none';
  tip.innerHTML='<div class="prd-tooltip-header"><span class="prd-tooltip-title">'+data.title+'</span><button class="prd-tooltip-close" onclick="closeTooltip(\''+id+'\')">×</button></div><div class="prd-tooltip-body">'+data.content+'</div>';
  var badge=document.querySelector('.prd-badge[data-badge-id="'+id+'"]');
  var rect=badge?badge.getBoundingClientRect():{top:e.clientY,left:e.clientX};
  var left=rect.left+rect.width/2-225;if(left<10)left=10;if(left+450>window.innerWidth-10)left=window.innerWidth-460;
  var top=rect.bottom+8;if(top+400>window.innerHeight)top=rect.top-408;
  tip.style.left=left+'px';tip.style.top=top+'px';tip.style.display='block';tip.style.zIndex='9959';activeTooltip=tip;
}
function closeTooltip(id){var tip=document.getElementById('tooltip-'+id);if(tip){tip.style.display='none';if(activeTooltip===tip)activeTooltip=null;}}
document.querySelectorAll('.prd-badge').forEach(function(b){b.addEventListener('mouseenter',function(e){showTooltip(b.getAttribute('data-badge-id'),e)});b.addEventListener('mouseleave',function(e){var id=b.getAttribute('data-badge-id');tooltipTimers[id]=setTimeout(function(){closeTooltip(id)},200)})});
document.querySelectorAll('.prd-tooltip').forEach(function(t){t.addEventListener('mouseenter',function(){var id=t.id.replace('tooltip-','');if(tooltipTimers[id])clearTimeout(tooltipTimers[id])});t.addEventListener('mouseleave',function(){closeTooltip(t.id.replace('tooltip-',''))})});
var dragTarget=null,dx=0,dy=0;
document.addEventListener('mousedown',function(e){var h=e.target.closest('.prd-tooltip-header');if(!h)return;dragTarget=h.closest('.prd-tooltip');if(dragTarget){dx=e.clientX-dragTarget.offsetLeft;dy=e.clientY-dragTarget.offsetTop}});
document.addEventListener('mousemove',function(e){if(!dragTarget)return;dragTarget.style.left=(e.clientX-dx)+'px';dragTarget.style.top=(e.clientY-dy)+'px'});
document.addEventListener('mouseup',function(){dragTarget=null});
function openDrawer(){document.getElementById('drawerBody').innerHTML=pagePrdContent;document.getElementById('drawerOverlay').classList.add('is-open');document.getElementById('drawer').classList.add('is-open')}
function closeDrawer(){document.getElementById('drawerOverlay').classList.remove('is-open');document.getElementById('drawer').classList.remove('is-open')}
var badgesVisible=true;
document.getElementById('badgeToggle').addEventListener('click',function(){badgesVisible=!badgesVisible;var b=document.querySelectorAll('.prd-badge');for(var i=0;i<b.length;i++)b[i].style.display=badgesVisible?'':'none';document.getElementById('toggleEyeOn').style.display=badgesVisible?'':'none';document.getElementById('toggleEyeOff').style.display=badgesVisible?'none':''});
