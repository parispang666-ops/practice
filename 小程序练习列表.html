<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>模拟练习 · 环慧慧EHS+</title>
  <style>
    :root {
      --color-brand: #1570EF;
      --color-brand-hover: #2E90FA;
      --color-success: #00C5C3;
      --color-warning: #FF8340;
      --color-text-primary: #1A1A1A;
      --color-text-secondary: #666666;
      --color-text-placeholder: #999999;
      --color-bg-page: #F5F5F5;
      --color-bg-surface: #FFFFFF;
      --color-border: #E5E5E5;
      --color-divider: #EEEEEE;
      --radius-card: 12px;
      --font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-family);
      font-size: 15px;
      line-height: 1.5;
      color: var(--color-text-primary);
      background: var(--color-bg-page);
      max-width: 414px;
      margin: 0 auto;
      min-height: 100vh;
      -webkit-tap-highlight-color: transparent;
      -webkit-font-smoothing: antialiased;
    }

    /* ---- 状态栏占位 ---- */
    .status-bar {
      height: env(safe-area-inset-top, 20px);
      background: #fff;
    }

    /* ---- 顶部导航 ---- */
    .nav-bar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: #fff;
      border-bottom: 1px solid var(--color-divider);
    }

    .nav-inner {
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 16px;
      position: relative;
    }

    .nav-back {
      position: absolute;
      left: 12px;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: 0;
      color: var(--color-text-primary);
      cursor: pointer;
    }

    .nav-back svg {
      width: 20px;
      height: 20px;
    }

    .nav-title {
      font-size: 17px;
      font-weight: 500;
      color: var(--color-text-primary);
    }

    /* ---- 练习列表 ---- */
    .list-body {
      padding: 12px 16px 24px;
    }

    /* ---- 自由练习入口卡片 ---- */
    .free-entry-card {
      background: #fff;
      border-radius: var(--radius-card);
      padding: 20px;
      display: flex;
      align-items: center;
      cursor: pointer;
      transition: transform 120ms ease;
      margin-bottom: 24px;
    }

    .free-entry-card:active {
      transform: scale(0.98);
    }

    .free-entry-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-right: 14px;
      background: linear-gradient(135deg, #EFF8FF 0%, #D9E6F7 100%);
      color: #1570EF;
    }

    .free-entry-icon svg {
      width: 24px;
      height: 24px;
    }

    .free-entry-info {
      flex: 1;
      min-width: 0;
    }

    .free-entry-title {
      font-size: 16px;
      font-weight: 500;
      color: var(--color-text-primary);
      margin-bottom: 4px;
    }

    .free-entry-desc {
      font-size: 13px;
      color: var(--color-text-secondary);
    }

    .free-entry-arrow {
      width: 20px;
      height: 20px;
      color: #CCCCCC;
      flex-shrink: 0;
    }

    /* ---- 模拟练习区域 ---- */
    .paper-section {
      /* container */
    }

    .paper-section-header {
      display: flex;
      align-items: center;
      padding: 0 0 16px 0;
      gap: 8px;
      margin-top: 4px;
    }

    .paper-section-title {
      font-size: 17px;
      font-weight: 600;
      color: var(--color-text-primary);
    }

    .paper-section-count {
      font-size: 14px;
      color: var(--color-text-placeholder);
      font-weight: 400;
    }

    .paper-cards {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .paper-card {
      background: #fff;
      border-radius: 16px;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      cursor: pointer;
      transition: transform 120ms ease, box-shadow 120ms ease, opacity 200ms ease;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      position: relative;
    }

    .paper-card:active {
      transform: scale(0.98);
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .paper-card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .paper-card-name {
      font-size: 17px;
      font-weight: 600;
      color: var(--color-text-primary);
      line-height: 1.4;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
      min-width: 0;
    }

    .paper-card-status {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 500;
      flex-shrink: 0;
      white-space: nowrap;
    }

    .paper-card-status .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .status-pending { color: #FA8C16; background: #FFF7E6; }
    .status-pending .status-dot { background: #FA8C16; }
    .status-active { color: #52C41A; background: #F6FFED; }
    .status-active .status-dot { background: #52C41A; }
    .status-ended { color: #999; background: #F5F5F5; }
    .status-ended .status-dot { background: #999; }

    .paper-card-time {
      margin-top: 14px;
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
      overflow: hidden;
    }

    .paper-card-time .time-icon {
      width: 15px;
      height: 15px;
      flex-shrink: 0;
      color: var(--color-brand);
    }

    .paper-card-time .time-label {
      color: var(--color-text-placeholder);
      font-size: 13px;
      flex-shrink: 0;
    }

    .paper-card-time .time-separator {
      color: var(--color-text-placeholder);
      font-size: 13px;
      margin: 0 2px;
      flex-shrink: 0;
    }

    .paper-card-time .time-value {
      color: var(--color-text-secondary);
      font-size: 13px;
      font-weight: 500;
    }

    .paper-card-footer {
      display: flex;
      justify-content: center;
      margin-top: 20px;
    }

    .paper-card-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      height: 36px;
      padding: 0 48px;
      border-radius: 18px;
      border: none;
      background: var(--color-brand);
      color: #fff;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      line-height: 1;
      transition: background 150ms ease;
    }

    .paper-card-btn:active {
      background: var(--color-brand-hover);
    }

    /* ---- 空状态 ---- */
    .empty-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 0;
      color: var(--color-text-placeholder);
    }

    .empty-wrap svg {
      width: 80px;
      height: 80px;
      margin-bottom: 12px;
      opacity: .4;
    }

    .empty-wrap p {
      font-size: 14px;
    }

    /* ---- 底部安全区 ---- */
    .safe-bottom {
      height: env(safe-area-inset-bottom, 16px);
    }

    /* ---- 隐藏 ---- */
    .hidden {
      display: none !important;
    }

    /* ========== 角标样式 ========== */
    .prd-badge {
      display: inline-block !important; vertical-align: top !important;
      font-size: 10px !important; font-weight: bold !important; line-height: 14px !important;
      padding: 0px 4px !important; border-radius: 2px !important;
      color: #fff !important; cursor: pointer !important;
      position: absolute !important; top: -8px !important; right: -4px !important;
      z-index: 900 !important; white-space: nowrap !important;
      font-family: var(--font-family) !important;
    }
    .prd-badge.normal { background: rgb(250, 173, 20) !important; }
    .prd-badge.changed { background: #F54A45 !important; }

    .badge-wrapper { position: relative; display: inline-block; }

    /* ========== 浮窗样式 ========== */
    .prd-tooltip {
      position: fixed; z-index: 9959;
      background: #FFFFFF; border: 2px solid #1890ff; border-radius: 4px;
      box-shadow: 0 6px 16px rgba(0,120,255,0.15);
      width: 450px; max-width: calc(100vw - 20px);
      display: none; font-family: var(--font-family); font-size: 13px;
    }
    .prd-tooltip-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px; background: #F0F7FF; border-bottom: 1px solid #E8E8E8;
      cursor: move; user-select: none;
    }
    .prd-tooltip-title { font-weight: 600; color: var(--color-text-primary); font-size: 14px; }
    .prd-tooltip-close {
      width: 22px; height: 22px; display: flex; align-items: center; justify-content: center;
      background: transparent; border: none; color: var(--color-text-placeholder);
      cursor: pointer; font-size: 16px; border-radius: 2px;
    }
    .prd-tooltip-close:hover { background: #E8E8E8; }
    .prd-tooltip-body { padding: 14px; max-height: 380px; overflow-y: auto; line-height: 1.6; color: var(--color-text-secondary); }
    .prd-tooltip-body p { margin-bottom: 12px; }
    .prd-tooltip-body strong { color: var(--color-text-primary); }
    .prd-tooltip-body ul, .prd-tooltip-body ol { padding-left: 18px; margin-bottom: 12px; }
    .prd-tooltip-body li { margin-bottom: 4px; }
    .prd-tooltip-body blockquote {
      border-left: 3px solid #E8E8E8; padding-left: 10px; margin: 0 0 12px; color: var(--color-text-placeholder);
    }
    .prd-tooltip-body table { width: 100%; border-collapse: collapse; margin-bottom: 12px; font-size: 12px; }
    .prd-tooltip-body th, .prd-tooltip-body td { border: 1px solid #E8E8E8; padding: 4px 8px; text-align: left; }
    .prd-tooltip-body th { background: #FAFAFA; font-weight: 600; }

    /* ========== PRD 抽屉 ========== */
    .prd-drawer-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.45); z-index: 10000; display: none;
    }
    .prd-drawer-overlay.is-open { display: block; }
    .prd-drawer {
      position: fixed; top: 0; right: -600px; width: 600px; max-width: 100vw; height: 100vh;
      background: #fff; z-index: 10001; transition: right 300ms ease;
      display: flex; flex-direction: column; box-shadow: -4px 0 16px rgba(0,0,0,0.1);
    }
    .prd-drawer.is-open { right: 0; }
    .prd-drawer-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px; border-bottom: 1px solid var(--color-divider); flex-shrink: 0;
    }
    .prd-drawer-title { font-size: 17px; font-weight: 600; color: var(--color-text-primary); }
    .prd-drawer-close {
      width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
      background: transparent; border: none; font-size: 20px; color: var(--color-text-secondary); cursor: pointer;
    }
    .prd-drawer-body { flex: 1; overflow-y: auto; padding: 20px; line-height: 1.6; }
    .prd-drawer-body h1, .prd-drawer-body h2, .prd-drawer-body h3 { color: var(--color-text-primary); margin: 20px 0 10px; }
    .prd-drawer-body h1 { font-size: 20px; }
    .prd-drawer-body h2 { font-size: 17px; border-bottom: 1px solid var(--color-divider); padding-bottom: 6px; }
    .prd-drawer-body h3 { font-size: 15px; }
    .prd-drawer-body p { margin-bottom: 10px; color: var(--color-text-secondary); }
    .prd-drawer-body ul, .prd-drawer-body ol { padding-left: 20px; margin-bottom: 10px; }
    .prd-drawer-body li { margin-bottom: 4px; }
    .prd-drawer-body table { width: 100%; border-collapse: collapse; margin-bottom: 16px; font-size: 13px; }
    .prd-drawer-body th, .prd-drawer-body td { border: 1px solid #E8E8E8; padding: 6px 10px; text-align: left; }
    .prd-drawer-body th { background: #FAFAFA; font-weight: 600; }
    .prd-drawer-body blockquote { border-left: 3px solid var(--color-brand); padding-left: 12px; margin: 0 0 12px; color: var(--color-text-placeholder); background: #F8F9FA; padding: 8px 12px; }

    /* ========== 标注开关 ========== */
    .badge-toggle-btn {
      position: fixed !important; bottom: 20px !important; right: 20px !important;
      z-index: 10001 !important; width: 44px !important; height: 44px !important;
      border-radius: 50% !important; background: #307FE2 !important; border: none !important;
      color: #fff !important; cursor: pointer !important; display: flex !important;
      align-items: center !important; justify-content: center !important;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2) !important;
    }
    .badge-toggle-btn svg { width: 20px; height: 20px; }

    /* ========== PRD 按钮 ========== */
    .prd-nav-btns {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      display: flex; gap: 6px;
    }
    .prd-nav-btn {
      height: 26px; padding: 0 8px; border-radius: 4px; font-size: 11px; font-weight: 500;
      background: #F0F7FF; border: 1px solid #1890ff; color: #1890ff; cursor: pointer;
      white-space: nowrap;
    }
  </style>
</head>
<body>

  <div class="status-bar"></div>

  <div class="nav-bar" style="position:relative;">
    <span class="badge-wrapper" style="position:absolute;top:2px;left:6px;z-index:110;">
      <span class="prd-badge changed" style="position:static !important;" data-badge-id="1">1</span>
    </span>
    <div class="nav-inner">
      <button class="nav-back" type="button" aria-label="返回" id="backBtn">
        <svg viewBox="0 0 48 48" fill="currentColor"><path d="M30.83 37.17L17.66 24 30.83 10.83 28 8 12 24l16 16z"/></svg>
      </button>
      <span class="nav-title" id="navTitle">模拟练习</span>
      <div class="prd-nav-btns">
        <button class="prd-nav-btn" onclick="openDrawer()" title="查看页面PRD">📄 页面PRD</button>
      </div>
    </div>
  </div>

  <!-- 练习列表 -->
  <div class="list-body" id="listPage">
    <div id="listBody"></div>
  </div>

  <div class="safe-bottom"></div>

  <script>
    // 模拟练习数据（来自管理后台「练习设置 → 模拟练习」）
    const practices = [
      { id: 1, name: '2026年安全知识练习1', createdAt: '2026-06-15T09:30:00', openTimeStart: '2026-06-10 08:00', openTimeEnd: '2026-07-10 20:00' },
      { id: 2, name: '2026年消防知识练习', createdAt: '2026-06-18T14:22:00', openTimeStart: '2026-08-01 09:00', openTimeEnd: '2026-09-01 18:00' },
      { id: 3, name: '安全基础知识考核', createdAt: '2026-05-20T10:15:00', openTimeStart: '2026-05-01 10:00', openTimeEnd: '2026-05-31 10:00' },
    ];

    // 获取练习状态
    function getPracticeStatus(item) {
      var now = new Date();
      var start = item.openTimeStart ? new Date(item.openTimeStart.replace(' ', 'T')) : null;
      var end = item.openTimeEnd ? new Date(item.openTimeEnd.replace(' ', 'T')) : null;
      if (!start && !end) return { status: 'unknown', label: '-', cls: '' };
      if (start && now < start) return { status: 'notStarted', label: '未开始', cls: 'status-pending' };
      if (!end || now <= end) return { status: 'inProgress', label: '进行中', cls: 'status-active' };
      return { status: 'ended', label: '已结束', cls: 'status-ended' };
    }

    // 渲染模拟练习列表（按创建时间倒序）
    function renderPracticeList() {
      const container = document.getElementById('listBody');

      // 按创建时间倒序排列
      const paperPractices = [...practices]
        .sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

      if (paperPractices.length === 0) {
        container.innerHTML = `
          <div class="empty-wrap">
            <svg viewBox="0 0 120 120" fill="currentColor"><rect x="20" y="20" width="80" height="80" rx="8" fill="#E8EBF0"/><rect x="32" y="40" width="56" height="8" rx="4" fill="#C4C9D1"/><rect x="32" y="56" width="40" height="8" rx="4" fill="#C4C9D1"/><circle cx="60" cy="60" r="28" fill="none" stroke="#C4C9D1" stroke-width="2"/><path d="M52 60h16M52 64h12" stroke="#C4C9D1" stroke-width="2" stroke-linecap="round"/></svg>
            <p>暂无数据</p>
          </div>
        `;
        return;
      }

      document.getElementById('backBtn').style.visibility = 'visible';

      container.innerHTML = `
        <div class="paper-section" style="position:relative;padding-top:8px;">
          <span class="badge-wrapper" style="position:absolute;top:0;right:18px;z-index:10;">
            <span class="prd-badge changed" style="position:static !important;" data-badge-id="2">2</span>
          </span>
          <div class="paper-cards" style="position:relative;">
            <span class="badge-wrapper" style="position:absolute;top:4px;right:10px;z-index:10;">
              <span class="prd-badge changed" style="position:static !important;" data-badge-id="3">3</span>
            </span>
            ${paperPractices.map(item => {
              var st = getPracticeStatus(item);
              var isActive = st.status === 'inProgress';
              return `
              <div class="paper-card" data-id="${item.id}">
                <div class="paper-card-header">
                  <div class="paper-card-name">${item.name}</div>
                  <span class="paper-card-status ${st.cls}">
                    <span class="status-dot"></span>${st.label}
                  </span>
                </div>
                <div class="paper-card-time">
                  <svg class="time-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                  <span class="time-label">开放时间</span>
                  <span class="time-value">${item.openTimeStart || '未设置'}</span>
                  <span class="time-separator">~</span>
                  <span class="time-value">${item.openTimeEnd || '未设置'}</span>
                </div>
                ${isActive ? `
                <div class="paper-card-footer">
                  <button class="paper-card-btn">
                    前往练习
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
                  </button>
                </div>
                ` : ''}
              </div>
            `}).join('')}
          </div>
        </div>
      `;
    }

    // 初始化：直接渲染试卷列表（无有效试卷则展示空数据）
    function init() {
      document.getElementById('listPage').classList.remove('hidden');
      renderPracticeList();
    }

    // 返回按钮 → 返回工作台页面
    document.getElementById('backBtn').addEventListener('click', () => {
      window.location.href = '小程序工作台页面.html';
    });

    // 事件委托：试卷卡片点击
    document.getElementById('listBody').addEventListener('click', (e) => {
      // 试卷卡片
      const paperCard = e.target.closest('.paper-card');
      if (paperCard) {
        const id = paperCard.dataset.id;
        const item = practices.find(p => p.id == id);
        if (item) {
          const st = getPracticeStatus(item);
          if (st.status !== 'inProgress') return;
          window.location.href = '小程序练习页面.html?id=' + encodeURIComponent(id) + '&name=' + encodeURIComponent(item.name);
        }
      }
    });

    /* ---- 启动 ---- */
    init();
  </script>

  <!-- ========== 标注浮窗容器 ========== -->
  <div class="prd-tooltip" id="tooltip-1"></div>
  <div class="prd-tooltip" id="tooltip-2"></div>
  <div class="prd-tooltip" id="tooltip-3"></div>

  <!-- ========== PRD 抽屉 ========== -->
  <div class="prd-drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
  <div class="prd-drawer" id="drawer">
    <div class="prd-drawer-header">
      <span class="prd-drawer-title">📄 小程序练习列表 · 页面 PRD</span>
      <button class="prd-drawer-close" onclick="closeDrawer()">×</button>
    </div>
    <div class="prd-drawer-body" id="drawerBody"></div>
  </div>

  <!-- ========== 标注开关 ========== -->
  <button class="badge-toggle-btn" id="badgeToggle" title="显示/隐藏标注">
    <svg id="toggleEyeOn" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
      <circle cx="12" cy="12" r="3"/>
    </svg>
    <svg id="toggleEyeOff" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none;">
      <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/>
      <line x1="1" y1="1" x2="23" y2="23"/>
    </svg>
  </button>

  <!-- ==================== PRD标注交互脚本 ==================== -->
  <script>
    'use strict';

    // ==================== 标注数据 ====================
    var badgeData = {
      "1": {
        title: "需求描述：页面路由逻辑",
        content: "<p><strong>页面展示由有效模拟练习数量决定：</strong></p>" +
          "<table><tr><th>用户可见试卷数</th><th>展示结果</th></tr>" +

    // ==================== PRD 抽屉内容 ====================
    var pagePrdContent = '<h1>小程序练习列表 · 页面 PRD</h1>\n' +

      '<h2>[1] [2] 1. 引言</h2>\n' +

      '<h2>[1] 2. 页面路由逻辑</h2>\n' +
      '<p>页面展示由有效模拟练习数量决定：</p>\n' +
      '<table><tr><th>用户可见试卷数</th><th>展示结果</th></tr><tr><td>0 条</td><td>展示<strong>列表空数据</strong>（提示「暂无数据」）</td></tr><tr><td>≥1 条</td><td>展示<strong>模拟练习列表</strong></td></tr></table>\n' +
      '<blockquote><strong>用户可见试卷数</strong> = 已发布 + 当前用户在练习人员范围内 的试卷数量。<br><br>「练习人员范围」判定逻辑：<br>· 用户在该练习的「练习人员」列表中：可见<br>· 用户不在该练习的「练习人员」列表中：不可见</blockquote>\n' +
      '<h2>[2] 3. 页面结构</h2>\n' +
      '<h3>3.1 页面布局（ASCII 线框图）</h3>\n' +
      '<pre>┌──────────────────────────────┐\n│       ··· (状态栏)            │\n├──────────────────────────────┤\n│  ←     模拟练习               │  导航栏\n├──────────────────────────────┤\n│                              │\n│  ┌──────────────────────────────┐\n│  │ 练习名称          [未开始]  │\n│  │ 🕐 开放时间 06-10 ~ 07-10 │  试卷卡片\n│  └──────────────────────────────┘\n│  ┌──────────────────────────────┐\n│  │ 练习名称          [进行中]  │\n│  │ 🕐 开放时间 08-01 ~ 09-01 │\n│  │          [前往练习]        │\n│  └──────────────────────────────┘\n│  ┌──────────────────────────────┐\n│  │ 练习名称          [已结束]  │\n│  │ 🕐 开放时间 05-01 ~ 05-31 │\n│  └──────────────────────────────┘\n│                              │\n└──────────────────────────────┘</pre>\n' +
      '<h3>3.2 空数据页面</h3>\n' +
      '<pre>┌──────────────────────────────┐\n│       ··· (状态栏)            │\n├──────────────────────────────┤\n│          模拟练习              │  导航栏\n├──────────────────────────────┤\n│                              │\n│           [图标]              │\n│                              │\n│          暂无数据             │\n│                              │\n└──────────────────────────────┘</pre>\n' +
      '<h2>[3] 4. 试卷卡片</h2>\n' +
      '<h3>4.1 卡片元素</h3>\n' +
      '<table><tr><th>元素</th><th>位置</th><th>说明</th></tr><tr><td>练习名称</td><td>卡片左上</td><td>管理后台配置的名称，单行截断</td></tr><tr><td>状态标签</td><td>卡片右上</td><td>三种状态：未开始 / 进行中 / 已结束</td></tr><tr><td>开放时间</td><td>名称下方</td><td>显示「开放时间」+ 开始时间 ~ 结束时间</td></tr><tr><td>前往练习按钮</td><td>卡片底部</td><td><strong>仅「进行中」状态显示</strong></td></tr></table>\n' +
      '<h3>4.2 状态标签规则</h3>\n' +
      '<table><tr><th>状态</th><th>判定条件</th><th>标签文案</th></tr><tr><td>未开始</td><td>当前时间早于练习开始时间</td><td>未开始</td></tr><tr><td>进行中</td><td>当前时间在练习开始时间和结束时间之间</td><td>进行中</td></tr><tr><td>已结束</td><td>当前时间晚于练习结束时间</td><td>已结束</td></tr></table>\n' +
      '<blockquote>若未设置开放时间，状态显示为「无」。</blockquote>\n' +
      '<h3>4.3 卡片排序</h3>\n' +

      '<table><tr><th>交互操作</th><th>行为</th></tr><tr><td>点击「进行中」卡片（任意位置）</td><td>跳转该模拟练习页面</td></tr><tr><td>点击「未开始」卡片</td><td>不响应跳转</td></tr><tr><td>点击「已结束」卡片</td><td>不响应跳转</td></tr></table>\n' +
      '<h2>5. 导航栏</h2>\n' +
      '<table><tr><th>元素</th><th>位置</th><th>行为</th></tr><tr><td>返回按钮 ←</td><td>左侧</td><td>点击返回工作台页面</td></tr><tr><td>标题「模拟练习」</td><td>居中</td><td>纯文本展示</td></tr></table>\n' +
      '<p>空数据时返回按钮正常显示，可返回上一页。</p>\n' +
      '<h2>6. 数据来源</h2>\n' +
      '<table><tr><th>字段</th><th>类型</th><th>说明</th></tr><tr><td>练习编号</td><td>文本</td><td>练习唯一标识</td></tr><tr><td>练习名称</td><td>文本</td><td>管理后台配置的练习名称</td></tr><tr><td>开放开始时间</td><td>日期时间</td><td>练习开放起始时间</td></tr><tr><td>开放结束时间</td><td>日期时间</td><td>练习开放截止时间</td></tr><tr><td>创建时间</td><td>日期时间</td><td>用于排序，最新创建排前</td></tr><tr><td>是否已发布</td><td>是/否</td><td>标记是否已发布</td></tr><tr><td>练习人员</td><td>人员列表</td><td>指定可参与练习的人员</td></tr></table>\n' +
      '<h2>7. 异常处理</h2>\n' +
      '<table><tr><th>异常场景</th><th>处理方式</th></tr><tr><td>无有效模拟练习</td><td>展示列表空状态：「暂无数据」</td></tr><tr><td>接口请求失败</td><td>轻提示「加载失败，请稍后重试」</td></tr><tr><td>用户无权限</td><td>对应试卷不展示，逻辑等同于无数据</td></tr></table>';

    // ==================== 通用浮窗交互 ====================
    var activeTooltip = null;
    var tooltipTimers = {};

    function showTooltip(badgeId, e) {
      var tip = document.getElementById('tooltip-' + badgeId);
      var data = badgeData[badgeId];
      if (!tip || !data) return;

      if (tooltipTimers[badgeId]) { clearTimeout(tooltipTimers[badgeId]); }

      if (activeTooltip && activeTooltip !== tip) {
        activeTooltip.style.display = 'none';
      }

      tip.innerHTML = '<div class="prd-tooltip-header">' +
        '<span class="prd-tooltip-title">' + data.title + '</span>' +
        '<button class="prd-tooltip-close" onclick="closeTooltip(\'' + badgeId + '\')">×</button>' +
        '</div>' +
        '<div class="prd-tooltip-body">' + data.content + '</div>';

      var badge = document.querySelector('.prd-badge[data-badge-id="' + badgeId + '"]');
      var rect = badge ? badge.getBoundingClientRect() : { top: e.clientY, left: e.clientX };

      var tipWidth = 450;
      var left = rect.left + rect.width / 2 - tipWidth / 2;
      if (left < 10) left = 10;
      if (left + tipWidth > window.innerWidth - 10) left = window.innerWidth - tipWidth - 10;

      var top = rect.bottom + 8;
      if (top + 400 > window.innerHeight) top = rect.top - 400 - 8;

      tip.style.left = left + 'px';
      tip.style.top = top + 'px';
      tip.style.display = 'block';
      tip.style.zIndex = '9959';
      activeTooltip = tip;
    }

    function closeTooltip(badgeId) {
      var tip = document.getElementById('tooltip-' + badgeId);
      if (tip) {
        tip.style.display = 'none';
        if (activeTooltip === tip) activeTooltip = null;
      }
    }

    function isMouseInTooltip(badgeId) {
      var tip = document.getElementById('tooltip-' + badgeId);
      if (!tip || tip.style.display === 'none') return false;
      var rect = tip.getBoundingClientRect();
      var mx = window.mouseX || 0, my = window.mouseY || 0;
      return mx >= rect.left && mx <= rect.right && my >= rect.top && my <= rect.bottom;
    }

    // ===== 角标 hover 事件（使用 MutationObserver 支持动态元素） =====
    function bindBadgeEvents() {
      document.querySelectorAll('.prd-badge:not([data-bound])').forEach(function(badge) {
        badge.setAttribute('data-bound', '1');
        badge.addEventListener('mouseenter', function(e) {
          var id = badge.getAttribute('data-badge-id');
          showTooltip(id, e);
        });
        badge.addEventListener('mouseleave', function(e) {
          var id = badge.getAttribute('data-badge-id');
          tooltipTimers[id] = setTimeout(function() {
            if (!isMouseInTooltip(id)) closeTooltip(id);
          }, 200);
        });
      });

      document.querySelectorAll('.prd-tooltip:not([data-bound])').forEach(function(tip) {
        tip.setAttribute('data-bound', '1');
        tip.addEventListener('mouseenter', function() {
          var badgeId = tip.id.replace('tooltip-', '');
          if (tooltipTimers[badgeId]) clearTimeout(tooltipTimers[badgeId]);
        });
        tip.addEventListener('mouseleave', function() {
          var badgeId = tip.id.replace('tooltip-', '');
          closeTooltip(badgeId);
        });
      });
    }

    // 初始绑定 + 动态监听
    bindBadgeEvents();
    var observer = new MutationObserver(function() { bindBadgeEvents(); });
    observer.observe(document.body, { childList: true, subtree: true });

    document.addEventListener('mousemove', function(e) { window.mouseX = e.clientX; window.mouseY = e.clientY; });

    // ===== 浮窗拖拽 =====
    var dragTarget = null, dragOffsetX = 0, dragOffsetY = 0;
    document.addEventListener('mousedown', function(e) {
      var header = e.target.closest('.prd-tooltip-header');
      if (!header) return;
      dragTarget = header.closest('.prd-tooltip');
      if (dragTarget) {
        dragOffsetX = e.clientX - dragTarget.offsetLeft;
        dragOffsetY = e.clientY - dragTarget.offsetTop;
      }
    });
    document.addEventListener('mousemove', function(e) {
      if (!dragTarget) return;
      dragTarget.style.left = (e.clientX - dragOffsetX) + 'px';
      dragTarget.style.top = (e.clientY - dragOffsetY) + 'px';
    });
    document.addEventListener('mouseup', function() { dragTarget = null; });

    // ==================== PRD 抽屉 ====================
    function openDrawer() {
      document.getElementById('drawerBody').innerHTML = pagePrdContent;
      document.getElementById('drawerOverlay').classList.add('is-open');
      document.getElementById('drawer').classList.add('is-open');
    }
    function closeDrawer() {
      document.getElementById('drawerOverlay').classList.remove('is-open');
      document.getElementById('drawer').classList.remove('is-open');
    }
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') closeDrawer();
    });

    // ==================== 全局标注开关 ====================
    var badgesVisible = true;
    document.getElementById('badgeToggle').addEventListener('click', function() {
      badgesVisible = !badgesVisible;
      var badges = document.querySelectorAll('.prd-badge');
      for (var i = 0; i < badges.length; i++) {
        badges[i].style.display = badgesVisible ? '' : 'none';
      }
      document.getElementById('toggleEyeOn').style.display = badgesVisible ? '' : 'none';
      document.getElementById('toggleEyeOff').style.display = badgesVisible ? 'none' : '';
    });
  </script>
