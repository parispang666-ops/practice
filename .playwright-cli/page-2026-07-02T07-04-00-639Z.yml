        - listitem [ref=e424]: 结束时间 > 开始时间 →「结束时间必须大于开始时间」
        - listitem [ref=e425]: 新增时开始时间 > 当前时间 →「开始时间必须大于当前时间」（编辑时若已开始的练习不可修改开始时间）
        - listitem [ref=e426]: 题目总数 > 0 →「请输入有效的题目总数」
        - listitem [ref=e427]: 总数 ≤ 试卷题目总数 →「题目总数不能超过试卷题目总数（N 道）」
        - listitem [ref=e428]: 至少选一种题型 →「请至少选择一种题目类型」
        - listitem [ref=e429]: 各题型之和 = 总数 →「各题型数量之和需等于题目总数」
        - listitem [ref=e430]: 各题型数量 ≤ 试卷对应类型上限 →「不能超过试卷单选/多选/判断题数量（N 道）」
        - listitem [ref=e431]: 练习人员必填，须至少添加一个人员或部门 →「请至少添加一个人员或部门」
