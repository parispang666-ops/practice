      - heading "1. 引言" [level=2] [ref=e93]
      - heading "1.1 背景" [level=3] [ref=e94]
      - paragraph [ref=e95]: 在练习设置页新增「模拟练习」Tab，管理员选择关联标准试卷，按试卷结构配置练习参数（题目总数、各题型数量、练习开放时间、练习人员）。模拟练习支持灵活划定题目范围，进行针对性强化训练，适用于考前冲刺与阶段性能力评估。员工在小程序端按配置进行刷题练习。本需求仅覆盖模拟练习相关功能，不涉及已存在的「专业练习」Tab。
      - heading "1.2 使用角色" [level=3] [ref=e96]
      - list [ref=e97]:
        - listitem [ref=e98]:
          - strong [ref=e99]: 管理员
          - text: ：可查看、新增、编辑、删除、发布模拟练习配置
        - listitem [ref=e100]:
          - strong [ref=e101]: 平台员工
          - text: ：无此页面访问权限（仅在小程序端参与练习）
      - heading "1.3 前置条件" [level=3] [ref=e102]
      - list [ref=e103]:
        - listitem [ref=e104]: 用户已登录系统
        - listitem [ref=e105]: 用户具有「练习设置」菜单权限（管理员角色）
        - listitem [ref=e106]: 系统中已存在试卷数据（用于选择器）
      - paragraph [ref=e107]:
        - strong [ref=e108]: 注意：
        - text: 试卷仅用于创建练习时的题目配置来源，练习创建后与试卷解耦。试卷的删除不影响已创建的练习功能，已发布的练习仍可正常使用。
