      - paragraph [ref=e246]:
        - strong [ref=e247]: 发布前校验（按顺序）：
      - list [ref=e248]:
        - listitem [ref=e249]: 练习开放时间必须完整填写 →「请先编辑练习，填写完整的练习开放时间后再发布」
        - listitem [ref=e250]: 结束时间必须大于开始时间 →「结束时间必须大于开始时间，请先修改后再发布」
        - listitem [ref=e251]: 开始时间必须大于当前时间 →「开始时间必须大于当前时间，请先修改后再发布」
      - heading "3.2.2 编辑" [level=4] [ref=e252]
