        - listitem [ref=e256]:
          - strong [ref=e257]: 行为：
          - text: 打开右侧表单页，回填全部已有数据（包括练习名称、试卷、题目数量、练习开放时间、人员范围）
          - list [ref=e258]:
            - listitem [ref=e259]:
              - strong [ref=e260]: 草稿状态：
              - text: 全部字段可编辑，试卷可选，底部「返回+保存」
            - listitem [ref=e261]:
              - strong [ref=e262]: 人员范围回显：
              - text: 编辑草稿时，已选人员/部门以标签形式完整回显，按指定用户和部门范围分组展示，支持逐项移除和重新添加
      - heading "3.2.3 删除" [level=4] [ref=e263]
      - list [ref=e264]:
        - listitem [ref=e265]:
          - strong [ref=e266]: 显示条件：
          - text: 草稿
        - listitem [ref=e267]:
          - strong [ref=e268]: 行为：
          - text: 弹出确认弹窗，文案「确定要删除该练习吗？此操作不可恢复。」
        - listitem [ref=e269]:
          - strong [ref=e270]: 确认后：
          - text: 从数据列表移除，刷新表格
        - listitem [ref=e271]:
          - strong [ref=e272]: 反馈：
          - text: 提示「删除成功」，3 秒后自动消失
        - listitem [ref=e273]:
          - strong [ref=e274]: 禁用情况：
